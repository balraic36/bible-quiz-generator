<!DOCTYPE html>
<html lang="ne">
<head>

        button { width: 100%; padding: 14px; border: none; border-radius: 6px; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.3s; }

        .btn-generate:hover { background-color: #d43f27; }

        .btn-fetch:hover { background-color: #1e3a68; }

        .download-group { display: none; flex-direction: column; gap: 10px; margin-top: 20px; }
        .btn-json { background-color: #28a745; color: white; }
        .btn-csv { background-color: #107c41; color: white; }
        .btn-word { background-color: #2b579a; color: white; }

        .flex-row { display: flex; gap: 10px; align-items: flex-end; margin-top: 5px; }
        .flex-row > div { flex: 1; }
        
        .api-box { background-color: #fdfdfd; border: 1px solid #e0e0e0; padding: 10px; border-radius: 8px; margin-top: 10px; }
        .hint-text { font-size: 11px; color: #666; margin-top: 5px; }

        #printArea { display: none; }
        @media print {
            body { background-color: white !important; margin: 0; padding: 0; }
            .container { display: none !important; }
            #printArea { display: block !important; padding: 20px; color: black; }
            .page-break-safe { page-break-inside: avoid; break-inside: avoid; margin-bottom: 20px; }
        }
    </style>
</head>
<body>

<div id="printArea"></div>

<script>
    let generatedData = null;
    let fullBookData = null; 
    let currentBookCode = "";

    function toNepaliNum(num) {
        return num.toString().replace(/\d/g, d => '०।'[d] || d); // सुरक्षित नेपाली अंक रूपान्तरण
    }

    // 💡 पूर्ण रूपमा सुधार्दिएको स्मार्ट अध्याय फिल्टर (Advanced Chapter Parser)
    function extractChapters(data, start, end) {
        if (!data) return data;
        
        try {
            if (typeof data === 'string') data = JSON.parse(data);

            // यदि डाटाभित्र 'chapters' नामको मुख्य सूची छ भने
            let chaptersArray = data.chapters || data;

            if (Array.isArray(chaptersArray)) {
                // फिल्टर गर्ने: start र end बीचको अध्याय वा सही इन्डेक्स भएको भाग पत्ता लगाउने
                let extracted = chaptersArray.filter(ch => {
                    let chNum = parseInt(ch.chapter || ch.chapterNumber || ch.id);
                    if (!isNaN(chNum)) {
                        return chNum >= start && chNum <= end;
                    }
                    return false;
                });

                // यदि 'chapter' भन्ने किवर्ड भेटिएन भने सामान्य इन्डेक्स अनुसार काट्ने
                if (extracted.length === 0) {
                    // यदि पहिलो तत्व परिचय/भूमिका हो भने त्यसलाई छाडेर हिसाब गर्ने
                    let startIndex = start - 1;
                    let endIndex = end;
                    return chaptersArray.slice(startIndex, endIndex);
                }
                return extracted;
            }
        } catch (e) {
            console.error("Extraction error:", e);
        }
        return data;
    }

    function processAndLimitData(data, start, end) {
        const geminiKey = document.getElementById('geminiKey').value.trim();
        const SAFE_CHAR_LIMIT = geminiKey ? 100000 : 15000; 
        
        let rawString = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
        
        if (rawString.length > SAFE_CHAR_LIMIT) {
            let safeString = rawString.substring(0, SAFE_CHAR_LIMIT);
            let lastBrace = safeString.lastIndexOf('}');
            if (lastBrace > SAFE_CHAR_LIMIT * 0.7) {
                safeString = safeString.substring(0, lastBrace + 1) + "\n\n... (Token Limit को कारण अटोमेटिक मिलाइएको)";
            }
            return { text: safeString, actualEndCh: start, wasLimited: true };
        }
        return { text: data, actualEndCh: end, wasLimited: false };
    }

    async function fetchFromGitHub() {
        const bookSelect = document.getElementById('bookSelect');
        const bookCode = bookSelect.value;
        const bookName = bookSelect.options[bookSelect.selectedIndex].text.split(' ')[0];
        
        let startCh = parseInt(document.getElementById('startCh').value) || 1;
        let endCh = parseInt(document.getElementById('endCh').value) || startCh;
        
        if (startCh > endCh) {
            endCh = startCh;
            document.getElementById('endCh').value = endCh;
        }

        const url = `https://raw.githubusercontent.com/iyamsamrat/NNRV_Bible/main/${bookCode}.json`;
        const statusEl = document.getElementById('status');
        const textArea = document.getElementById('bibleText');
        const chapterDetails = document.getElementById('chapterDetails');

        statusEl.innerHTML = `${bookName} तान्दै... ⏳`;
        statusEl.style.color = "#007bff";

        try {
            if(currentBookCode !== bookCode || !fullBookData) {
                const response = await fetch(url);
                if (!response.ok) throw new Error("डेटा भेटिएन।");
                const rawText = await response.text();
                try { fullBookData = JSON.parse(rawText); } 
                catch(e) { fullBookData = rawText; }
                currentBookCode = bookCode;
            }

            // नयाँ स्मार्ट फिल्टर प्रयोग गरिएको
            let filteredData = extractChapters(fullBookData, startCh, endCh);
            let safeData = processAndLimitData(filteredData, startCh, endCh);
            
            textArea.value = typeof safeData.text === 'string' ? safeData.text : JSON.stringify(safeData.text, null, 2);
            
            document.getElementById('endCh').value = safeData.actualEndCh;
            let finalRange = startCh === safeData.actualEndCh ? `${startCh}` : `${startCh}-${safeData.actualEndCh}`;
            chapterDetails.value = `${bookName} ${finalRange}`;

            if(safeData.wasLimited) {
                statusEl.innerHTML = `⚠️ टोकन लिमिट सुरक्षित गर्न अध्याय ${startCh} देखि ${safeData.actualEndCh} सम्म मात्र राखिएको छ।`;
                statusEl.style.color = "#d9534f"; 
            } else {
                statusEl.innerHTML = `✅ अध्याय ${finalRange} सफलतापूर्वक तानियो! अब Generate थिच्नुहोस्।`;
                statusEl.style.color = "green";
            }
        } catch (error) {
            statusEl.innerHTML = "❌ त्रुटि: पाठ तान्न सकिएन।";
            statusEl.style.color = "red";
        }
    }

    async function callGroq(apiKey, prompt) {
        const url = `https://api.groq.com/openai/v1/chat/completions`;
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
            body: JSON.stringify({
                model: "llama-3.3-70b-versatile",
                messages: [
                    { role: "system", content: "You are a helpful assistant designed to output strictly JSON." },
                    { role: "user", content: prompt }
                ],
                response_format: { type: "json_object" },
                temperature: 0.3,
                max_tokens: 4000
            })
        });
        if (!response.ok) {
            const errData = await response.json();
            throw new Error("Groq Error: " + (errData.error?.message || "सर्भरले काम गरेन।"));
        }
        const data = await response.json();
        return data.choices[0].message.content;
    }

    async function callGemini(apiKey, prompt, modelVersion) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelVersion}:generateContent?key=${apiKey}`;
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { temperature: 0.3 } 
            })
        });
        if (!response.ok) {
            const errData = await response.json();
            throw new Error("Gemini Error: " + (errData.error?.message || "सर्भरले काम गरेन।"));
        }
        const data = await response.json();
        return data.candidates[0].content.parts[0].text;
    }

    async function generateQuestions() {
        const groqKey = document.getElementById('groqKey').value.trim();
        const geminiKey = document.getElementById('geminiKey').value.trim();
        const chapterDetails = document.getElementById('chapterDetails').value.trim();
        const qCount = document.getElementById('qCount').value;
        const difficulty = document.getElementById('difficulty').value;
        const bibleText = document.getElementById('bibleText').value.trim();
        const statusEl = document.getElementById('status');
        const downloadGroup = document.getElementById('downloadGroup');

        if (!groqKey && !geminiKey) {
            statusEl.innerHTML = "❌ कृपया कम्तिमा एउटा API Key हाल्नुहोस् (Groq वा Gemini)!";
            statusEl.style.color = "red";
            return;
        }

        if (!chapterDetails || !bibleText) {
            statusEl.innerHTML = "❌ कृपया पाठ तान्नुहोस् र विवरण भर्नुहोस्!";
            statusEl.style.color = "red";
            return;
        }

        document.getElementById('generateBtn').disabled = true;
        downloadGroup.style.display = 'none';

        const prompt = `तपाईं एक NNRV बाइबल क्विज विशेषज्ञ हुनुहुन्छ। तल दिइएको बाइबल पाठ पढेर नेपाली भाषामा ठ्याक्कै ${qCount} वटा बहुवैकल्पिक (MCQ) प्रश्नहरू बनाउनुहोस्।
प्रश्नको स्तर: ${difficulty === 'Mixed' ? 'Easy, Medium, र Hard मिसाएर' : difficulty + ' मात्र'}
सन्दर्भ: ${chapterDetails}

नियम:
१. तपाईंको आउटपुट अनिवार्य रूपमा एउटा JSON Object हुनुपर्छ।
२. उक्त JSON Object भित्र "questions" नामको एउटा Array हुनुपर्छ।
३. प्रत्येक प्रश्नको Schema यस्तो हुनुपर्छ:
{
  "category": "Bible Quiz",
  "bookDetails": "${chapterDetails}",
  "verseReference": "...", 
  "questionText": "...",
  "optionA": "...",
  "optionB": "...",
  "optionC": "...",
  "optionD": "...",
  "correctAnswer": "A/B/C/D",
  "difficulty": "Easy/Medium/Hard"
}
४. "verseReference" मा ठ्याक्कै कुन पुस्तक, अध्याय र पदबाट प्रश्न सोधिएको हो, त्यो लेख्नुहोस् (जस्तै: दानिएल २:४५)।

बाइबल पाठ:
${bibleText}`;

        let jsonString = null;
        let success = false;
        let lastErrorMsg = "";

        if (groqKey) {
            try {
                statusEl.innerHTML = "१. <b>Groq</b> बाट प्रश्नहरू बन्दैछन्... ⏳";
                statusEl.style.color = "#007bff";
                jsonString = await callGroq(groqKey, prompt);
                success = true;
            } catch (error) {
                lastErrorMsg = error.message;
            }
        }

        if (geminiKey && !success) {
            try {
                if (groqKey) {
                    statusEl.innerHTML = `⚠️ Groq फेल भयो। <b>Gemini Flash</b> ट्राइ गर्दैछ... ⏳`;
                } else {
                    statusEl.innerHTML = "<b>Gemini Flash</b> बाट प्रश्नहरू बन्दैछन्... ⏳";
                }
                statusEl.style.color = "#007bff";
                // यहाँ 'gemini-1.5-flash' प्रयोग गरिएको छ जुन Google को v1beta मा पूर्ण समर्थित छ
                jsonString = await callGemini(geminiKey, prompt, 'gemini-1.5-flash');
                success = true;
            } catch (error) {
                lastErrorMsg = error.message;
                try {
                    statusEl.innerHTML = "⚠️ Flash फेल भयो। अन्तिम विकल्प <b>Gemini Pro</b> ट्राइ गर्दैछ... ⏳";
                    jsonString = await callGemini(geminiKey, prompt, 'gemini-1.5-pro');
                    success = true;
                } catch (errPro) {
                    lastErrorMsg = errPro.message;
                }
            }
        }

        if (!success) {
             statusEl.innerHTML = `❌ त्रुटि: ${lastErrorMsg}<br><span style="font-size:12px; color:#555;">(माथिको म्यासेज पढेर Key चेक गर्नुहोस्)</span>`;
             statusEl.style.color = "red";
             document.getElementById('generateBtn').disabled = false;
             return;
        }

        if (success && jsonString) {
            try {
                jsonString = jsonString.replace(/```json/g, '').replace(/```/g, '').trim();
                const jsonObject = JSON.parse(jsonString);
                const finalArray = jsonObject.questions ? jsonObject.questions : jsonObject;
                
                generatedData = JSON.stringify(finalArray, null, 4); 
                
                statusEl.innerHTML = "✅ सफलता! प्रश्नहरू तयार भए। तलबाट डाउनलोड गर्नुहोस्।";
                statusEl.style.color = "green";
                downloadGroup.style.display = 'flex'; 
            } catch (parseError) {
                statusEl.innerHTML = "❌ त्रुटि: AI ले सही ढाँचामा प्रश्न दिएन। फेरि ट्राइ गर्नुहोस्।";
                statusEl.style.color = "red";
            }
        }

        document.getElementById('generateBtn').disabled = false;
    }

    function downloadJSON() {
        if (!generatedData) return;
        let safeName = document.getElementById('chapterDetails').value.trim().replace(/[^a-z0-9]/gi, '_').toLowerCase();
        const blob = new Blob([generatedData], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `nnrv_${safeName || 'questions'}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    function downloadCSV() {
        if (!generatedData) return;
        const data = JSON.parse(generatedData);
        const headers = Object.keys(data[0]);
        let csvContent = headers.join(",") + "\n";
        data.forEach(row => {
            let values = headers.map(header => {
                let val = row[header] ? row[header].toString() : "";
                return `"${val.replace(/"/g, '""')}"`;
            });
            csvContent += values.join(",") + "\n";
        });
        const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        let safeName = document.getElementById('chapterDetails').value.trim().replace(/[^a-z0-9]/gi, '_').toLowerCase();
        a.download = `nnrv_${safeName || 'questions'}.csv`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    function downloadWord() {
        if (!generatedData) return;
        const data = JSON.parse(generatedData);
        const chapterDetails = document.getElementById('chapterDetails').value.trim();

        let content = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>`;
        content += `<head><meta charset='utf-8'><title>Bible Quiz</title></head><body>`;
        content += `<div style='text-align:center; font-size: 20px; font-weight: bold;'>बाइबल Quiz प्रश्नहरु</div>`;
        content += `<div style='text-align:center; font-size: 16px; margin-bottom: 20px;'>पुस्तक : ${chapterDetails} बाट</div><hr>`;

        data.forEach((q, index) => {
            let nepaliNum = toNepaliNum(index + 1);
            let referenceText = q.verseReference ? q.verseReference : q.bookDetails;
            content += `<div style='margin-bottom: 15px;'>`;
            content += `<div style='font-size: 16px; font-weight: bold; margin-bottom: 5px;'>${nepaliNum}) ${q.questionText}</div>`;
            content += `<div style='font-size: 16px; margin-left: 20px; line-height: 1.5;'>`;
            content += `A: ${q.optionA}<br>B: ${q.optionB}<br>C: ${q.optionC}<br>D: ${q.optionD}`;
            content += `</div>`;
            content += `<div style='font-size: 16px; font-weight: bold; margin-top: 5px; margin-left: 20px; color: #0b5e31;'>सही उत्तर: ${q.correctAnswer} <span style='font-size: 14px; font-weight: normal; color: #555;'>(सन्दर्भ: ${referenceText})</span></div>`;
            content += `</div>`;
        });
        content += `</body></html>`;

        const blob = new Blob(['\ufeff', content], { type: 'application/msword' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        let safeName = chapterDetails.replace(/[^a-z0-9]/gi, '_').toLowerCase();
        a.download = `nnrv_${safeName || 'questions'}.doc`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    function downloadPDF() {
        if (!generatedData) return;
        const data = JSON.parse(generatedData);
        const chapterDetails = document.getElementById('chapterDetails').value.trim();
        const printDiv = document.getElementById('printArea');

        let content = `<div style="font-family: sans-serif; max-width: 800px; margin: auto;">`;
        content += `<h2 style="text-align: center; margin-bottom: 5px;">बाइबल Quiz प्रश्नहरु</h2>`;
        content += `<h3 style="text-align: center; margin-top: 0; color: #555;">पुस्तक : ${chapterDetails} बाट</h3><hr style="margin-bottom:20px;">`;

        data.forEach((q, index) => {
            let nepaliNum = toNepaliNum(index + 1);
            let referenceText = q.verseReference ? q.verseReference : q.bookDetails;
            content += `<div class="page-break-safe">`;
            content += `<div style="font-size: 16px; font-weight: bold; margin-bottom: 8px;">${nepaliNum}) ${q.questionText}</div>`;
            content += `<div style="font-size: 16px; margin-left: 20px; line-height: 1.6;">`;
            content += `A: ${q.optionA}<br>B: ${q.optionB}<br>C: ${q.optionC}<br>D: ${q.optionD}`;
            content += `</div>`;
            content += `<div style="font-size: 16px; font-weight: bold; margin-top: 5px; margin-left: 20px; color: #0b5e31;">सही उत्तर: ${q.correctAnswer} <span style="font-size: 14px; font-weight: normal; color: #555;">(सन्दर्भ: ${referenceText})</span></div>`;
            content += `</div>`;
        });
        content += `</div>`;
        printDiv.innerHTML = content;

        setTimeout(() => { window.print(); }, 500); 
    }
</script>
