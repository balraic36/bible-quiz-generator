<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NNRV Bible Quiz Generator Pro (Groq AI)</title>
    <style>
        :root {
            --primary-color: #2F5597;
            --secondary-color: #1F3864;
            --success-color: #28a745;
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 12px;
            background-color: var(--bg-color);
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: auto;
        }

        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 20px;
            font-size: 22px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        label {
            font-weight: 600;
            display: block;
            font-size: 13px;
            color: #333;
            margin-bottom: 4px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .row .form-group {
            flex: 1;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-generate {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-generate:hover {
            background-color: var(--secondary-color);
        }

        .btn-download {
            background-color: var(--success-color);
            color: white;
            display: none;
        }

        .btn-copy {
            background-color: #17a2b8;
            color: white;
            display: none;
        }

        #status {
            margin-top: 15px;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
        }

        /* Preview Section */
        #previewContainer {
            margin-top: 25px;
            display: none;
        }

        .preview-title {
            font-weight: bold;
            font-size: 16px;
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 5px;
            margin-bottom: 12px;
        }

        .q-card {
            background: #f8f9fa;
            border-left: 4px solid var(--primary-color);
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 4px;
            font-size: 13px;
        }

        .q-card strong { color: #111; }
        .q-card .ref { color: #28a745; font-weight: 600; margin-top: 4px; }
        .q-card .opt { color: #555; margin-left: 10px; }
        .q-card .correct { color: #d9534f; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>📖 NNRV बाइबल क्विज जेनेरेटर (Pro)</h2>
    
    <div class="form-group">
        <label>Groq API Key:</label>
        <input type="password" id="apiKey" placeholder="आफ्नो Groq API Key यहाँ राख्नुहोस्">
    </div>

    <div class="row">
        <div class="form-group">
            <label>AI मोडल (Model):</label>
            <select id="modelSelect">
                <option value="llama-3.3-70b-versatile">Llama 3.3 70B (अत्यन्तै उत्कृष्ट)</option>
                <option value="llama3-70b-8192">Llama 3 70B (छिटो)</option>
                <option value="llama-3.1-8b-instant">Llama 3.1 8B (अति द्रुत)</option>
            </select>
        </div>
        <div class="form-group">
            <label>पुस्तकको नाम:</label>
            <input type="text" id="bookName" placeholder="उदा: रूथ, मत्ती">
        </div>
    </div>

    <div class="row">
        <div class="form-group">
            <label>समूह/वर्ग (Category):</label>
            <input type="text" id="category" placeholder="उदा: पुराना नियम, इतिहास">
        </div>
        <div class="form-group">
            <label>अध्याय र पद (Chapter/Verse):</label>
            <input type="text" id="chapterVerse" placeholder="उदा: अध्याय १ (पद १-२२)">
        </div>
    </div>

    <div class="row">
        <div class="form-group">
            <label>प्रश्नको प्रकार (Type):</label>
            <select id="qType">
                <option value="MCQ">बहुवैकल्पिक (MCQ - ४ विकल्प)</option>
                <option value="DIRECT">सिधा प्रश्न (Direct Answer)</option>
            </select>
        </div>
        <div class="form-group">
            <label>संख्या (Count):</label>
            <input type="number" id="qCount" value="10" min="1" max="50">
        </div>
    </div>

    <div class="form-group">
        <label>कठिनाई स्तर (Difficulty):</label>
        <select id="difficulty">
            <option value="Mixed">सबै मिसाएको (Mixed - Easy, Medium, Hard)</option>
            <option value="Easy">सजिलो मात्र (Easy)</option>
            <option value="Medium">मध्यम मात्र (Medium)</option>
            <option value="Hard">गाह्रो मात्र (Hard)</option>
        </select>
    </div>

    <div class="form-group">
        <label>बाइबलको पाठ्यभाग (Bible Text):</label>
        <textarea id="bibleText" rows="6" placeholder="यहाँ बाइबलको अध्याय वा पदहरू पेस्ट गर्नुहोस्..."></textarea>
    </div>

    <button class="btn-generate" id="generateBtn" onclick="generateQuestions()">प्रश्नहरू तयार पार्नुहोस् (Generate)</button>
    
    <div id="status"></div>

    <button class="btn-download" id="downloadBtn" onclick="downloadJSON()">JSON फाइल डाउनलोड गर्नुहोस् ⬇️</button>
    <button class="btn-copy" id="copyBtn" onclick="copyToClipboard()">JSON कपि गर्नुहोस् 📋</button>

    <!-- Preview Box -->
    <div id="previewContainer">
        <div class="preview-title">बनेका प्रश्नहरूको नमुना (Live Preview)</div>
        <div id="previewList"></div>
    </div>
</div>

<script>
    let generatedQuestionsArray = [];

    async function generateQuestions() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const modelSelect = document.getElementById('modelSelect').value;
        const bookName = document.getElementById('bookName').value.trim();
        const category = document.getElementById('category').value.trim() || "बाइबल अध्ययन";
        const chapterVerse = document.getElementById('chapterVerse').value.trim() || "१";
        const qType = document.getElementById('qType').value;
        const qCount = document.getElementById('qCount').value;
        const difficulty = document.getElementById('difficulty').value;
        const bibleText = document.getElementById('bibleText').value.trim();

        const statusEl = document.getElementById('status');
        const downloadBtn = document.getElementById('downloadBtn');
        const copyBtn = document.getElementById('copyBtn');
        const previewContainer = document.getElementById('previewContainer');
        const previewList = document.getElementById('previewList');

        if (!apiKey || !bookName || !bibleText) {
            statusEl.innerText = "⚠️ कृपया Groq API Key, पुस्तकको नाम र बाइबलको पाठ अनिवार्य भर्नुहोस्!";
            statusEl.style.backgroundColor = "#ffe6e6";
            statusEl.style.color = "red";
            return;
        }

        statusEl.innerText = "⏳ Groq AI ले प्रश्नहरू बनाउँदैछ... कृपया केही सेकेन्ड पर्खनुहोस्।";
        statusEl.style.backgroundColor = "#e6f2ff";
        statusEl.style.color = "#0056b3";
        document.getElementById('generateBtn').disabled = true;
        downloadBtn.style.display = 'none';
        copyBtn.style.display = 'none';
        previewContainer.style.display = 'none';

        // Prompt Logic
        let formatInstructions = "";
        if (qType === "MCQ") {
            formatInstructions = `
कडा नियमहरू:
१. प्रत्येक प्रश्नको ४ वटा विकल्पहरू (optionA, optionB, optionC, optionD) हुनुपर्छ।
२. सही उत्तरलाई सधैं A मा नराखी A, B, C, वा D मा यादृच्छिक रूपमा (Randomly) छ्यासमिस गरेर राख्नुहोस्। 'correctOption' मा सही विकल्पको अक्षर ("A", "B", "C", वा "D") लेख्नुहोस्।
३. गलत विकल्पहरू (Distractors) एकदमै उस्तै-उस्तै लाग्ने, पाठ्यभागसँग मिल्दाजुल्दा र मानिस झुक्किने खालका हुनुपर्छ।
४. 'answerWithRef' मा "सन्दर्भ" भन्ने शब्द प्रयोग नगर्नुहोस्। यसलाई सिधै "[पुस्तक अध्याय:पद] सही उत्तर वाक्य" को ढाँचामा लेख्नुहोस् (उदा: "${bookName} १:१०. \"हामी तपाईंका मानिसहरूकहाँ जानेछौं।\"")।

प्रत्येक JSON अब्जेक्टको ढाँचा:
{
  "category": "${category}",
  "book": "${bookName}",
  "chapterVerse": "${chapterVerse}",
  "questionText": "प्रश्न...",
  "optionA": "विकल्प A",
  "optionB": "विकल्प B",
  "optionC": "विकल्प C",
  "optionD": "विकल्प D",
  "correctOption": "A/B/C/D",
  "correctAnswer": "सही उत्तरको वाक्य",
  "answerWithRef": "${bookName} १:१०. \"सही उत्तर वाक्य।\"",
  "difficulty": "Easy/Medium/Hard"
}`;
        } else {
            formatInstructions = `
कडा नियमहरू:
१. यो सिधा प्रश्न (Direct Q&A) हो। विकल्पहरू (optionA, optionB...) नबनाउनुहोस्।
२. सोझै सोधिने प्रश्न र त्यसको छोटो सटिक उत्तर 'correctAnswer' मा राख्नुहोस्।
३. 'answerWithRef' मा "सन्दर्भ" शब्द नराखी सिधै "[पुस्तक अध्याय:पद] सही उत्तर वाक्य" लेख्नुहोस्।

प्रत्येक JSON अब्जेक्टको ढाँचा:
{
  "category": "${category}",
  "book": "${bookName}",
  "chapterVerse": "${chapterVerse}",
  "questionText": "प्रश्न...",
  "correctAnswer": "सही उत्तर",
  "answerWithRef": "${bookName} १:१०. \"सही उत्तर वाक्य।\"",
  "difficulty": "Easy/Medium/Hard"
}`;
        }

        const systemPrompt = `तपाईं NNRV बाइबल क्विज विशेषज्ञ हुनुहुन्छ। तल दिइएको पाठ पढेर ठ्याक्कै ${qCount} वटा प्रश्नहरू बनाउनुहोस्।
स्तर: ${difficulty === 'Mixed' ? 'Easy, Medium, र Hard को सन्तुलित मिश्रण' : difficulty}

आउटपुट अनिवार्य रूपमा विशुद्ध JSON Array हुनुपर्छ। JSON बाहेक अन्य कुनै व्याख्यात्मक पाठ नलेख्नुहोस्।

${formatInstructions}

बाइबल पाठ्यभाग:
-----------------
${bibleText}
-----------------`;

        const url = `https://api.groq.com/openai/v1/chat/completions`;

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: modelSelect,
                    messages: [{ role: "user", content: systemPrompt }],
                    temperature: 0.4
                })
            });

            if (!response.ok) {
                throw new Error(`API Error: ${response.status} ${response.statusText}`);
            }

            const data = await response.json();
            
            if (data.choices && data.choices[0].message.content) {
                let rawContent = data.choices[0].message.content.trim();
                
                // Clean markdown code blocks if present
                if (rawContent.startsWith("```")) {
                    rawContent = rawContent.replace(/^```json/i, "").replace(/^```/, "").replace(/```$/, "").trim();
                }

                generatedQuestionsArray = JSON.parse(rawContent);

                statusEl.innerText = `✅ सफलता! जम्मा ${generatedQuestionsArray.length} वटा प्रश्नहरू तयार भए।`;
                statusEl.style.backgroundColor = "#e6ffe6";
                statusEl.style.color = "green";
                
                downloadBtn.style.display = 'block';
                copyBtn.style.display = 'block';

                // Render Preview
                renderPreview(generatedQuestionsArray, qType);
                previewContainer.style.display = 'block';
            } else {
                throw new Error("API ले कुनै डेटा फर्काएन।");
            }
        } catch (error) {
            statusEl.innerText = `❌ त्रुटि: ${error.message}. कृपया API Key र इन्टरनेट जाँच गर्नुहोस्।`;
            statusEl.style.backgroundColor = "#ffe6e6";
            statusEl.style.color = "red";
            console.error(error);
        } finally {
            document.getElementById('generateBtn').disabled = false;
        }
    }

    function renderPreview(questions, type) {
        const previewList = document.getElementById('previewList');
        previewList.innerHTML = "";

        questions.forEach((q, idx) => {
            const card = document.createElement('div');
            card.className = 'q-card';
            
            let optionsHTML = "";
            if (type === "MCQ") {
                optionsHTML = `
                    <div class="opt">A: ${q.optionA}</div>
                    <div class="opt">B: ${q.optionB}</div>
                    <div class="opt">C: ${q.optionC}</div>
                    <div class="opt">D: ${q.optionD}</div>
                    <div class="correct">सही उत्तर: Option ${q.correctOption} (${q.correctAnswer})</div>
                `;
            } else {
                optionsHTML = `<div class="correct">सही उत्तर: ${q.correctAnswer}</div>`;
            }

            card.innerHTML = `
                <div><strong>${idx + 1}) ${q.questionText}</strong> [${q.difficulty}]</div>
                ${optionsHTML}
                <div class="ref">📖 ${q.answerWithRef}</div>
            `;

            previewList.appendChild(card);
        });
    }

    function downloadJSON() {
        if (!generatedQuestionsArray || generatedQuestionsArray.length === 0) return;
        const bookName = document.getElementById('bookName').value.trim() || "Questions";
        const qType = document.getElementById('qType').value;
        const jsonString = JSON.stringify(generatedQuestionsArray, null, 2);
        
        const blob = new Blob([jsonString], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `NNRV_${bookName}_${qType}_Questions.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    function copyToClipboard() {
        if (!generatedQuestionsArray || generatedQuestionsArray.length === 0) return;
        const jsonString = JSON.stringify(generatedQuestionsArray, null, 2);
        navigator.clipboard.writeText(jsonString).then(() => {
            alert("JSON डेटा क्लिपबोर्डमा कपि भयो!");
        });
    }
</script>

</body>
</html>
